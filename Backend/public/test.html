<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nio Booking API Tester</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f4f4;
      color: #222;
    }

    .container {
      max-width: 1200px;
      margin: 20px auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: #111;
      color: #facc15;
      padding: 18px 24px;
      font-size: 24px;
      font-weight: bold;
    }

    .content {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
    }

    .panel h3 {
      margin-top: 0;
      margin-bottom: 15px;
      color: #111;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      font-family: monospace;
    }

    .row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 10px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-group button {
      flex: 1;
      min-width: 120px;
      cursor: pointer;
      border: none;
      font-weight: bold;
    }

    .send-btn {
      background: #facc15;
      color: #111;
    }

    .clear-btn {
      background: #111;
      color: white;
    }

    .save-btn {
      background: #2563eb;
      color: white;
    }

    .status-box {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      font-size: 14px;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 15px;
      border-radius: 8px;
      min-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .small {
      font-size: 12px;
      color: #666;
      margin-top: -8px;
      margin-bottom: 12px;
    }

    @media (max-width: 900px) {
      .content {
        grid-template-columns: 1fr;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Nio Booking - API Tester</div>

    <div class="content">
      <div class="panel">
        <h3>Request</h3>

        <label for="method">Method</label>
        <select id="method">
          <option>GET</option>
          <option>POST</option>
          <option>PUT</option>
          <option>PATCH</option>
          <option>DELETE</option>
        </select>

        <label for="url">API URL</label>
        <input
          type="text"
          id="url"
          value="http://168.144.23.124:5000/api/health"
          placeholder="Enter full API URL"
        />

        <label for="headers">Headers (JSON format)</label>
        <textarea id="headers" placeholder='{"Content-Type":"application/json","Authorization":"Bearer token"}'>{
  "Content-Type": "application/json"
}</textarea>
        <div class="small">Example: {"Authorization":"Bearer YOUR_TOKEN"}</div>

        <label for="body">Body (JSON format)</label>
        <textarea id="body" placeholder='{"name":"test"}'></textarea>

        <div class="btn-group">
          <button class="send-btn" onclick="sendRequest()">Send Request</button>
          <button class="save-btn" onclick="saveData()">Save</button>
          <button class="clear-btn" onclick="clearForm()">Clear</button>
        </div>
      </div>

      <div class="panel">
        <h3>Response</h3>
        <div class="status-box" id="statusBox">Status: Waiting...</div>
        <pre id="responseOutput">Response will appear here...</pre>
      </div>
    </div>
  </div>

  <script>
    function saveData() {
      localStorage.setItem("apiTester_method", document.getElementById("method").value);
      localStorage.setItem("apiTester_url", document.getElementById("url").value);
      localStorage.setItem("apiTester_headers", document.getElementById("headers").value);
      localStorage.setItem("apiTester_body", document.getElementById("body").value);
      alert("Saved successfully");
    }

    function loadData() {
      const method = localStorage.getItem("apiTester_method");
      const url = localStorage.getItem("apiTester_url");
      const headers = localStorage.getItem("apiTester_headers");
      const body = localStorage.getItem("apiTester_body");

      if (method) document.getElementById("method").value = method;
      if (url) document.getElementById("url").value = url;
      if (headers) document.getElementById("headers").value = headers;
      if (body) document.getElementById("body").value = body;
    }

    function clearForm() {
      document.getElementById("method").value = "GET";
      document.getElementById("url").value = "";
      document.getElementById("headers").value = '{\n  "Content-Type": "application/json"\n}';
      document.getElementById("body").value = "";
      document.getElementById("responseOutput").textContent = "Response will appear here...";
      document.getElementById("statusBox").textContent = "Status: Waiting...";
    }

    async function sendRequest() {
      const method = document.getElementById("method").value;
      const url = document.getElementById("url").value.trim();
      const headersText = document.getElementById("headers").value.trim();
      const bodyText = document.getElementById("body").value.trim();
      const responseOutput = document.getElementById("responseOutput");
      const statusBox = document.getElementById("statusBox");

      if (!url) {
        alert("Please enter API URL");
        return;
      }

      let headers = {};
      let body = undefined;

      try {
        headers = headersText ? JSON.parse(headersText) : {};
      } catch (err) {
        alert("Headers must be valid JSON");
        return;
      }

      if (["POST", "PUT", "PATCH", "DELETE"].includes(method) && bodyText) {
        try {
          body = JSON.stringify(JSON.parse(bodyText));
        } catch (err) {
          alert("Body must be valid JSON");
          return;
        }
      }

      const options = {
        method,
        headers
      };

      if (body && method !== "GET") {
        options.body = body;
      }

      statusBox.textContent = "Status: Sending request...";
      responseOutput.textContent = "Loading...";

      try {
        const res = await fetch(url, options);
        const contentType = res.headers.get("content-type") || "";
        let responseData;

        if (contentType.includes("application/json")) {
          responseData = await res.json();
          responseOutput.textContent = JSON.stringify(responseData, null, 2);
        } else {
          responseData = await res.text();
          responseOutput.textContent = responseData;
        }

        statusBox.textContent = `Status: ${res.status} ${res.statusText}`;
      } catch (error) {
        statusBox.textContent = "Status: Request Failed";
        responseOutput.textContent = error.message;
      }
    }

    loadData();
  </script>
</body>
</html>
